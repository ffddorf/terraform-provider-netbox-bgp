provider:
  name: netboxbgp
resources:
  session:
    create:
      path: /api/plugins/bgp/bgpsession/
      method: POST
    read:
      path: /api/plugins/bgp/bgpsession/{id}/
      method: GET
    update:
      path: /api/plugins/bgp/bgpsession/{id}/
      method: PUT
    delete:
      path: /api/plugins/bgp/bgpsession/{id}/
      method: DELETE
    schema:
      ignores:
        - custom_fields
        - export_policies.custom_fields
        - import_policies.custom_fields

data_sources:
  session:
    read:
      path: /api/plugins/bgp/bgpsession/{id}/
      method: GET
    schema:
      ignores:
        - custom_fields
        - export_policies.custom_fields
        - import_policies.custom_fields
  sessions:
    read:
      path: /api/plugins/bgp/bgpsession/
      method: GET
    schema:
      ignores:
        - next
        - previous
        - results.custom_fields
        - results.export_policies.custom_fields
        - results.import_policies.custom_fields
